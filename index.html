<script>
// 사진 메모 버튼 10개를 화면에 그리는 핵심 함수
function renderSpares() {
  const grid = document.getElementById('spareGrid');
  if (!grid) return; // 공간이 없으면 실행 안 함
  
  const labels = getLabels(); // 설정된 이름 가져오기
  grid.innerHTML = ''; // 초기화
  
  for (let i = 0; i < 10; i++) {
    const lbl = labels[i] || {name: `메모${i+1}`, emoji: '📸'};
    const btn = document.createElement('button');
    btn.className = 'spare-btn';
    btn.innerHTML = `
      <div class="s-overlay">
        <span class="s-icon">${lbl.emoji}</span>
        <span class="s-name">${lbl.name}</span>
      </div>
    `;
    btn.onclick = () => openPM(i); // 클릭하면 메모장 열기
    grid.appendChild(btn);
  }
}

// 앱 시작 시 실행
window.onload = function() {
  renderSpares(); 
  updateClock();
  renderMemoTabs();
};
</script>

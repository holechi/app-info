<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>정보검색</title>
  <style>
    /* 폰 화면에 최적화된 디자인 */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: linear-gradient(160deg, #1a6fd8 0%, #0ea5e9 100%);
      color: #fff; display: flex; flex-direction: column; align-items: center;
      padding: 15px; min-height: 100dvh;
    }
    .card {
      width: 100%; max-width: 450px; background: rgba(255,255,255,0.2);
      border-radius: 15px; padding: 15px; margin-bottom: 15px; backdrop-filter: blur(10px);
    }
    #timeDisplay { font-size: 2.5rem; font-weight: bold; text-align: center; }
    .section-title { width: 100%; max-width: 450px; font-weight: bold; margin: 10px 0; }
    
    /* 코인 버튼 */
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 450px; }
    .btn { padding: 15px 5px; border-radius: 12px; text-align: center; text-decoration: none; color: #fff; font-weight: bold; font-size: 0.8rem; }
    .btn-xrp { background: #1565c0; } .btn-shib { background: #e65100; } .btn-btc { background: #bf360c; }

    /* 사진 메모 버튼 10개 */
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; max-width: 450px; }
    .memo-btn {
      aspect-ratio: 1/1; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px; color: #fff; display: flex; flex-direction: column; align-items: center;
      justify-content: center; font-size: 0.6rem;
    }
    .memo-btn span { font-size: 1.2rem; margin-bottom: 2px; }

    /* 메모장 */
    textarea { width: 100%; height: 120px; background: rgba(0,0,0,0.1); border: none; border-radius: 10px; color: #fff; padding: 10px; margin-top: 10px; outline: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="dateDisplay" style="text-align:center; font-size:0.8rem; opacity:0.8;"></div>
    <div id="timeDisplay">00:00:00</div>
  </div>

  <div class="section-title">🔍 코인 시세</div>
  <div class="grid-3">
    <a href="https://www.google.com/search?q=XRP+시세" target="_blank" class="btn btn-xrp">XRP</a>
    <a href="https://www.google.com/search?q=SHIB+시세" target="_blank" class="btn btn-shib">SHIB</a>
    <a href="https://www.google.com/search?q=BTC+시세" target="_blank" class="btn btn-btc">BTC</a>
  </div>

  <div class="section-title">📷 사진 메모장 (10개)</div>
  <div class="grid-5" id="memoGrid"></div>

  <div class="section-title">📝 일반 메모</div>
  <div class="card" style="margin-top:0;">
    <textarea id="mainMemo" placeholder="내용을 입력하세요..."></textarea>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById('dateDisplay').textContent = now.toLocaleDateString();
      document.getElementById('timeDisplay').textContent = now.toLocaleTimeString('ko-KR', {hour12:false});
    }
    setInterval(updateClock, 1000); updateClock();

    function renderButtons() {
      const grid = document.getElementById('memoGrid');
      grid.innerHTML = '';
      for (let i = 1; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.className = 'memo-btn';
        btn.innerHTML = `<span>📸</span>메모${i}`;
        btn.onclick = () => alert(`메모 ${i}번 기능 정상 작동 중`);
        grid.appendChild(btn);
      }
    }

    const mainMemo = document.getElementById('mainMemo');
    mainMemo.value = localStorage.getItem('basic_memo') || '';
    mainMemo.oninput = () => localStorage.setItem('basic_memo', mainMemo.value);

    // 실행 시점 강제 고정
    window.onload = renderButtons;
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>

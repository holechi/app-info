<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="정보검색"/>
  <meta name="theme-color" content="#1a6fd8"/>
  <link rel="manifest" href="manifest.json"/>
  <title>정보검색</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #1a6fd8 0%, #0ea5e9 100%);
      color: #fff; display: flex; flex-direction: column; align-items: center;
      padding: 15px 10px; min-height: 100vh; overflow-x: hidden;
    }
    .clock-card {
      width: 100%; max-width: 450px; background: rgba(255,255,255,0.2);
      border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px;
      backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3);
    }
    #timeDisplay { font-size: 2.8rem; font-weight: 800; }
    
    .section-label { width: 100%; max-width: 450px; font-weight: bold; margin: 15px 0 10px; font-size: 1rem; }
    
    /* 코인 버튼 */
    .btn-grid { width: 100%; max-width: 450px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .coin-btn {
      padding: 15px 5px; border-radius: 15px; text-decoration: none; color: #fff;
      display: flex; flex-direction: column; align-items: center; font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2); background: rgba(255,255,255,0.1);
    }
    .btn-xrp { background: #1565c0; } .btn-shib { background: #e65100; } .btn-btc { background: #bf360c; }

    /* 사진 메모장 그리드 (버튼 10개) */
    .spare-grid {
      width: 100%; max-width: 450px; display: grid;
      grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px;
    }
    .spare-btn {
      aspect-ratio: 1/1; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px; color: #fff; display: flex; flex-direction: column;
      align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold;
    }
    .spare-btn span { font-size: 1.2rem; margin-bottom: 4px; }

    /* 메모 영역 */
    .memo-card {
      width: 100%; max-width: 450px; background: rgba(0,0,0,0.2);
      border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1);
    }
    textarea {
      width: 100%; height: 200px; background: transparent; border: none;
      color: #fff; font-size: 1rem; resize: none; outline: none;
    }
    #saveStatus { color: #4ade80; font-size: 0.8rem; text-align: right; opacity: 0; transition: 0.3s; }
  </style>
</head>
<body>

  <div class="clock-card">
    <div id="dateDisplay" style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 5px;"></div>
    <div id="timeDisplay">00 : 00 : 00</div>
  </div>

  <div class="section-label">🔍 코인 시세</div>
  <div class="btn-grid">
    <a href="https://www.google.com/search?q=XRP+시세" target="_blank" class="coin-btn btn-xrp">XRP</a>
    <a href="https://www.google.com/search?q=SHIB+시세" target="_blank" class="coin-btn btn-shib">SHIB</a>
    <a href="https://www.google.com/search?q=BTC+시세" target="_blank" class="coin-btn btn-btc">BTC</a>
  </div>

  <div class="section-label">📷 사진 메모장 (10개)</div>
  <div class="spare-grid" id="spareGrid">
    </div>

  <div class="memo-card">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
      <span>📝 일반 메모</span>
      <span id="saveStatus">저장됨 ✓</span>
    </div>
    <textarea id="memoArea" placeholder="내용을 입력하세요..."></textarea>
  </div>

  <script>
    /* 1. 시계 기능 */
    function updateClock() {
      const now = new Date();
      const days = ['일','월','화','수','목','금','토'];
      document.getElementById('dateDisplay').textContent = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
      document.getElementById('timeDisplay').textContent = `${String(now.getHours()).padStart(2,'0')} : ${String(now.getMinutes()).padStart(2,'0')} : ${String(now.getSeconds()).padStart(2,'0')}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* 2. 사진 메모장 버튼 10개 생성 기능 */
    function renderSpares() {
      const grid = document.getElementById('spareGrid');
      grid.innerHTML = ''; 
      for (let i = 1; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.className = 'spare-btn';
        btn.innerHTML = `<span>📸</span>메모${i}`;
        btn.onclick = () => alert(`메모 ${i}번을 클릭했습니다. (기능 준비 중)`);
        grid.appendChild(btn);
      }
    }

    /* 3. 메모 자동 저장 기능 */
    const memoArea = document.getElementById('memoArea');
    const saveStatus = document.getElementById('saveStatus');
    memoArea.value = localStorage.getItem('my_app_memo') || '';

    memoArea.addEventListener('input', () => {
      localStorage.setItem('my_app_memo', memoArea.value);
      saveStatus.style.opacity = 1;
      setTimeout(() => { saveStatus.style.opacity = 0; }, 1000);
    });

    /* 4. 앱 초기화 */
    window.onload = function() {
      renderSpares(); // 버튼 10개 그리기
    };

    /* 5. 서비스 워커 등록 */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(() => {
        console.log("서비스 워커 등록 완료");
      });
    }
  </script>
</body>
</html>
